name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint + security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff safety

      - name: Lint (ruff)
        run: ruff check src/ server.py

      - name: Vulnerability scan (safety)
        run: safety check -r requirements.txt --short-report

  rust:
    name: Rust — clippy + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Clippy
        working-directory: frontend/src-tauri
        run: cargo clippy -- -D warnings

      - name: Cargo audit
        working-directory: frontend/src-tauri
        run: cargo audit

  frontend:
    name: Frontend — type-check + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high
