<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Story Curator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0e0e13;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
  .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#7c6af7;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:14px;color:#888;letter-spacing:.05em}
</style>
</head>
<body>
  <div class="spinner"></div>
  <p>Starting Street Story Curator…</p>
</body>
</html>
